<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStoque Mobile - Produtos</title>
    <style>
        body { background-color: #0d0d0d; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #16161a; border-bottom: 1px solid #222; }
        .navbar .logo { font-weight: bold; font-size: 16px; color: #ff3b30; display: flex; align-items: center; gap: 5px; }
        .navbar .menu { display: flex; gap: 20px; }
        .navbar .menu a { color: #8e8e93; text-decoration: none; font-size: 14px; transition: color 0.2s; }
        .navbar .menu a:hover, .navbar .menu a.active { color: #ffffff; font-weight: bold; }
        .navbar .menu a.sair { color: #ff453a; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        h3 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        .form-group { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 40px; background: #16161a; padding: 20px; border-radius: 8px; border: 1px solid #222; flex-wrap: wrap; }
        .input-box { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 150px; }
        .input-box label { font-size: 12px; color: #8e8e93; }
        .input-box input { background: #24242b; border: 1px solid #3a3a44; border-radius: 6px; padding: 10px; color: #fff; font-size: 14px; outline: none; }
        .input-box input:focus { border-color: #007aff; }
        .btn-cadastrar { background: #007aff; color: white; border: none; padding: 11px 24px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; height: 38px; }
        .btn-cadastrar:hover { background: #0062cc; }
        .search-box { width: 100%; max-width: 300px; background: #16161a; border: 1px solid #3a3a44; border-radius: 6px; padding: 10px; color: #fff; margin-bottom: 20px; outline: none; font-size: 14px; }
        .table-container { background: #16161a; border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #1c1c21; padding: 15px 20px; color: #8e8e93; font-weight: 500; border-bottom: 1px solid #222; }
        td { padding: 15px 20px; border-bottom: 1px solid #222; color: #e5e5ea; }
        tr:last-child td { border-bottom: none; }
        .price { color: #34c759; font-weight: 500; }
        .qty { color: #ff9500; font-weight: 500; }
        .btn-editar { background: #24242b; color: #fff; border: 1px solid #3a3a44; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-editar:hover { background: #3a3a44; }
        /* Container que segura a imagem e o lápis juntos */
        .img-container {position: relative; display: inline-block; width: 60px; /* Ajuste para o tamanho que você já usa na sua tabela */ height: 60px;}
        .produto-img {width: 100%; height: 100%; border-radius: 8px; object-fit: cover; /* Faz a imagem encaixar no quadrado sem distorcer */}
        /* O Lápis flutuante */
        .lapis-edit {position: absolute; top: -5px; right: -5px; background: #007bff; /* Azul do seu botão */ color: white; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: 0.2s;}
        .lapis-edit:hover {background: #0056b3; transform: scale(1.1); /* Dá um pequeno zoom ao passar o mouse */}
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">📌 SmartStoque</div>
        <div class="menu">
            <a href="/caixa" title="Caixa Operacional">🛒</a>
            <a href="/produtos" title="Produtos">📦</a>
            <a href="/clientes" title="Clientes">👤</a
            <a href="/" class="sair">Sair</a>
        </div>
    </div>

    <div class="container">
        <h3>Cadastrar Novo Produto</h3>
        <form id="formProduto" class="form-group" enctype="multipart/form-data">
            <label>Imagem do Produto</label>
            <input type="file" id="input-imagem" name="imagem" accept="image/*">
            
            <div class="input-box">
                <label>Nome do Produto</label>
                <input type="text" id="nome" name="nome" placeholder="Nome do Produto" required>
            </div>
            <div class="input-box">
                <label>Preço (R$)</label>
                <input type="number" step="0.01" id="preco" name="preco" placeholder="Preço (R$)" required>
            </div>
            <div class="input-box">
                <label>Qtd Estoque Inicial</label>
                <input type="number" id="quantidade" name="quantidade" placeholder="Qtd Estoque Inicial" required>
            </div>
            <button type="submit" class="btn-cadastrar">Cadastrar</button>
        </form>

        <h3>Produtos Cadastrados</h3>
        <input type="text" id="busca" class="search-box" placeholder="Buscar produto por nome..." oninput="filtrarProdutos()">

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Imagem</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Qtd Estoque</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaProdutos">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function carregarProdutos() {
            const res = await fetch('/api/produtos');
            const produtos = await res.json();
            const lista = document.getElementById('tabelaProdutos');
            lista.innerHTML = '';
            
            produtos.forEach(p => {
                // SACADA VISUAL: Se o produto tiver imagem, exibe ela pequena. Se não, usa o emoji 📦
                // Mantive a sua lógica intacta aqui!
                const tagImagem = p.imagem ? `<img src="${p.imagem}" style="width:35px; height:35px; object-fit:cover; border-radius:4px;">` : '📦';
                
                lista.innerHTML += `
                    <tr>
                        <td class="celula-imagem">
                            <div class="img-container">
                                <img src="${p.imagem}" alt="Imagem" class="produto-img">
            
                                <div class="lapis-edit" onclick="acionarInputImagem(${p.id})">✏️</div>
            
                                <input type="file" id="input-img-${p.id}" style="display: none;" accept="image/*" onchange="enviarNovaImagem(${p.id})">
                            </div>
                        </td>
                        <td style="font-weight: bold;">${p.nome}</td>
                        <td class="price">R$ ${p.preco.toFixed(2)}</td>
                        <td class="qty">${p.quantidade} un</td>
                        <td><button class="btn-editar" onclick="editarProduto(${p.id}, '${p.nome}', ${p.preco}, ${p.quantidade})">Editar</button></td>
                    </tr>
                `;
            });
        }

        // EVENTO DE ENVIO TOTALMENTE CORRIGIDO:
        document.getElementById('formProduto').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Captura o formulário e gera o FormData automaticamente usando os atributos 'name'
            const form = e.target;
            const formData = new FormData(form);

            try {
                const res = await fetch('/api/produtos/cadastrar', {
                    method: 'POST',
                    // CRÍTICO: Sem headers de Content-Type aqui! O FormData se vira sozinho.
                    body: formData
                });
                
                const r = await res.json();
                alert(r.mensagem);
                
                if (r.sucesso) {
                    form.reset();
                    carregarProdutos();
                }
            } catch (erro) {
                console.error("Erro na requisição:", erro);
                alert("Erro ao tentar conectar com o servidor.");
            }
        });

        function filtrarProdutos() {
            const busca = document.getElementById('busca').value.toLowerCase();
            const linhas = document.querySelectorAll('#tabelaProdutos tr');
            linhas.forEach(linha => {
                const nome = linha.cells[1].textContent.toLowerCase();
                linha.style.display = nome.includes(busca) ? '' : 'none';
            });
        }

        async function editarProduto(id, nomeAntigo, precoAntigo, qtdAntiga) {
            const novoNome = prompt("Novo nome:", nomeAntigo);
            const novoPreco = prompt("Novo preço (R$):", precoAntigo);
            const novaQtd = prompt("Nova quantidade em estoque:", qtdAntiga);
            if(novoNome && novoPreco && novaQtd) {
                const res = await fetch(`/api/produtos/editar/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: novoNome, preco: parseFloat(novoPreco), quantidade: parseInt(novaQtd) })
                });
                const r = await res.json();
                alert(r.mensagem);
                carregarProdutos();
            }
        }

        carregarProdutos();

        // 1. O clique no lápis aciona o clique no input invisível
function acionarInputImagem(idProduto) {
    document.getElementById(`input-img-${idProduto}`).click();
}

// 2. Quando o usuário escolhe a foto, essa função envia para o Python
async function enviarNovaImagem(idProduto) {
    const inputForm = document.getElementById(`input-img-${idProduto}`);
    const arquivo = inputForm.files[0];

    if (!arquivo) return; // Se o usuário abriu a janela e cancelou, não faz nada

    const formData = new FormData();
    formData.append('imagem', arquivo);

    try {
        // Envia a imagem para uma rota específica no Python
        const resposta = await fetch(`/api/atualizar_foto_produto/${idProduto}`, {
            method: 'POST',
            body: formData
        });

        const resultado = await resposta.json();

        if (resposta.ok && resultado.sucesso) {
            // Atualiza a página automaticamente para exibir a foto nova!
            window.location.reload(); 
        } else {
            alert("Erro ao salvar imagem: " + resultado.mensagem);
        }
    } catch (erro) {
        alert("Erro de conexão ao enviar a nova imagem.");
    }
}
    </script>
</body>
</html>
