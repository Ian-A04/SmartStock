<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStoque - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-card { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        h2 { margin-bottom: 10px; color: #1a1a1a; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        label { font-size: 12px; color: #007bff; position: absolute; top: -8px; left: 10px; background: white; padding: 0 4px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #007bff; }
        .btn-login { background: #007bff; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-login:hover { background: #0056b3; }
        .error-msg { color: #dc3545; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>SmartStoque</h2>
        <p>Insira suas credenciais para acessar o sistema</p>
        
        <div class="form-group">
            <label>Usuário</label>
            <input type="text" id="txt-usuario" placeholder="Digite seu usuário">
        </div>
        
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="txt-senha" placeholder="Digite sua senha">
        </div>
        
        <button class="btn-login" onclick="executarLogin()">Acessar Sistema</button>
        <div class="error-msg" id="erro-login"></div>
    </div>

    <script>
        async function executarLogin() {
            const usuario = document.getElementById('txt-usuario').value;
            const senha = document.getElementById('txt-senha').value;
            const erroDiv = document.getElementById('erro-login');
            
            erroDiv.style.display = 'none';

            const resposta = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, senha })
            });

            const resultado = await resposta.json();

            if (resposta.ok && resultado.sucesso) {
                // Salva a sessão localmente no navegador do usuário
                localStorage.setItem('usuario_id', resultado.usuario_id);
                localStorage.setItem('usuario_nome', resultado.nome);
                window.location.href = '/vendas';
            } else {
                erroDiv.innerText = resultado.mensagem || 'Erro ao conectar ao servidor.';
                erroDiv.style.style.display = 'block';
            }
        }
    </script>
</body>
</html>
